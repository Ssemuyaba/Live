<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="utf-8" />


<!-- Favicon -->
<link rel="icon" href="/logo.ico" />

<!-- Mobile responsiveness -->
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- Theme color -->
<meta name="theme-color" content="#000000" />

<!-- SEO Indexing -->
<meta name="robots" content="index, follow" />

<!-- Canonical URL -->
<link rel="canonical" href="https://live-beta-lemon.vercel.app/" />

<!-- Primary SEO -->
<title>SwiftBall Live - Watch Live Football & Sports Streams</title>

<meta
  name="description"
  content="Watch live football matches, upcoming games, and sports streams on SwiftBall. Real-time scores, match schedules, and HD live sports streaming."
/>

<meta
  name="keywords"
  content="live football, watch football online, soccer live streams, sports streaming, live matches today, swiftball live"
/>

<meta name="author" content="SwiftBall" />

<!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
<meta property="og:title" content="SwiftBall Live Sports" />
<meta
  property="og:description"
  content="Watch live football matches and sports streams online with real-time scores."
/>
<meta property="og:type" content="website" />
<meta property="og:url" content="https://live-beta-lemon.vercel.app" />
<meta property="og:image" content="https://live-beta-lemon.vercel.app/logo.ico" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="SwiftBall Live Sports" />
<meta
  name="twitter:description"
  content="Live football streams, upcoming matches and real-time sports updates."
/>
<meta name="twitter:image" content="https://live-beta-lemon.vercel.app/logo.ico" />

<!-- Apple Devices -->
<link rel="apple-touch-icon" href="https://live-beta-lemon.vercel.app/logo.ico" />

<!-- Manifest -->
<link rel="manifest" href="/manifest.json" />

<!-- Structured Data (SEO for sports content) -->
<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SportsEvent",
    "name": "Live Football Matches",
    "sport": "Soccer",
    "eventStatus": "https://schema.org/EventScheduled",
    "location": {
      "@type": "VirtualLocation",
      "url": "https://live-beta-lemon.vercel.app"
    },
    "organizer": {
      "@type": "Organization",
      "name": "SwiftBall",
      "url": "https://live-beta-lemon.vercel.app"
    },
    "description": "Watch live football matches and upcoming sports streams on SwiftBall."
  }
</script>


  </head>

<div id="root"></div>

</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="https://live-taupe-one.vercel.app/favicon.ico" />

    <!-- Mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Theme color -->
    <meta name="theme-color" content="#000000" />

    <!-- Primary SEO -->
    <title>SwiftBall Live - Watch Live Football & Sports Streams</title>

    <meta
      name="description"
      content="Watch live football matches, upcoming games, and sports streams on SwiftBall. Real-time scores, match schedules, and HD live sports streaming."
    />

    <meta
      name="keywords"
      content="live football, watch football online, soccer live streams, sports streaming, live matches today, swiftball live"
    />

    <meta name="author" content="SwiftBall" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:title" content="SwiftBall Live Sports" />
    <meta
      property="og:description"
      content="Watch live football matches and sports streams online with real-time scores."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://swiftball.vercel.app" />
    <meta property="og:image" content="https://live-taupe-one.vercel.app/logo192.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SwiftBall Live Sports" />
    <meta
      name="twitter:description"
      content="Live football streams, upcoming matches and real-time sports updates."
    />
    <meta name="twitter:image" content="https://live-taupe-one.vercel.app/logo192.png" />

    <!-- Apple devices -->
    <link rel="apple-touch-icon" href="https://live-taupe-one.vercel.app/logo192.png" />

    <!-- Manifest -->
    <link rel="manifest" href="https://live-taupe-one.vercel.app/manifest.json" />

    <!-- Structured Data (Helps Google understand sports content) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SportsEvent",
        "name": "Live Football Matches",
        "sport": "Soccer",
        "eventStatus": "https://schema.org/EventScheduled",
        "location": {
          "@type": "VirtualLocation",
          "url": "https://swiftball.vercel.app"
        },
        "organizer": {
          "@type": "Organization",
          "name": "SwiftBall"
        }
      }
    </script>

    <!--
      Notice the use of https://live-taupe-one.vercel.app in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
    -->
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root"></div>

    <!--
      This HTML file is a template.
      The build step will place the bundled scripts into the <body> tag.
    -->
  </body>
</html>
